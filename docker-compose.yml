version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: daytrace-postgres
    environment:
      POSTGRES_DB: daytrace
      POSTGRES_USER: daytrace
      POSTGRES_PASSWORD: daytrace_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daytrace"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
