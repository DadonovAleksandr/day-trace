services:
  postgres:
    image: postgres:16-alpine
    container_name: daytrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: daytrace
      POSTGRES_USER: daytrace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daytrace_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daytrace"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: daytrace-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=daytrace;Username=daytrace;Password=${POSTGRES_PASSWORD:-daytrace_dev}"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TelegramBot__BotToken: ${TELEGRAM_BOT_TOKEN:-}
      TelegramBot__WebhookSecretToken: ${TELEGRAM_WEBHOOK_SECRET:-}
      TelegramBot__WebhookBaseUrl: ${TELEGRAM_WEBHOOK_BASE_URL:-}
      TelegramBot__MiniAppUrl: ${TELEGRAM_MINIAPP_URL:-}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    ports:
      - "5005:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  admin-ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: admin-ui
    container_name: daytrace-admin-ui
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5174:80"

volumes:
  pgdata:
